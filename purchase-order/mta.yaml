_schema-version: 3.3.0
ID: purchase-order
version: 1.0.0
description: "Purchase Order Management CAP Application"
parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:

  # ── 1. HANA DB Deployer ────────────────────────────────────
  - name: purchase-order-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: purchase-order-db

  # ── 2. CAP Backend Service ─────────────────────────────────
  - name: purchase-order-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: purchase-order-auth
      - name: purchase-order-db

  # ── 3. Application Router ──────────────────────────────────
  - name: purchase-order-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: purchase-order-auth

resources:

  # ── XSUAA (authentication) ─────────────────────────────────
  - name: purchase-order-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: purchase-order-${org}-${space}
        tenant-mode: dedicated

  # ── HANA HDI Container (database) ─────────────────────────
  - name: purchase-order-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared